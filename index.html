    <script>
      // Open a centered popup window; fallback to navigation if blocked
      function popup(url, name) {
        const w = 100, h = 100;
        const left = window.screenX + Math.max(0, (window.outerWidth - w) / 2);
        const top = window.screenY + Math.max(0, (window.outerHeight - h) / 2);
        const features = `width=${w},height=${h},left=${left},top=${top},resizable,scrollbars`;
        const win = window.open(url, name, features);
        if (!win || win.closed === undefined) {
          // Popup blocked — open in same tab as fallback
          window.location.href = url;
        } else {
          win.focus();
        }
      }
    </script>
  </head>
