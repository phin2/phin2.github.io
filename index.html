  <body>

      <!-- Draggable DIV -->
  <div id="mydiv">
    <!-- Include a header DIV with the same name as the draggable DIV, followed by "header" -->
    <div id="mydivheader">About</div>

  </div>

    <div class="main-window">
      <div class = "bar"></div>
      <div style=" justify-content: center; align-items: center;  display: flex;">
        <h1 style="font-family: 'Comic Neue'; font-size: 50pt;">Phi Nguyen</h1>
      </div>


      <div class="icon-bar">
        <div class = "icon-bar__item" onclick="showDiv()" id = "about_btn" data-toggle="modal" data-target="#myModal">

          <p style = "font-family: 'Comic Neue';">About</p>
        </div>


        <div class = "icon-bar__item" id = "links_btn">

        <div class = "icon-bar__item" id ="projects_btn">

        </div>
      </div>
    </div>

<script>
  // Make the DIV element draggable:
dragElement(document.getElementById("mydiv"));

function dragElement(elmnt) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  if (document.getElementById(elmnt.id + "header")) {
    // if present, the header is where you move the DIV from:
    document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
  } else {
    // otherwise, move the DIV from anywhere inside the DIV:
    elmnt.onmousedown = dragMouseDown;
  }

  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    // get the mouse cursor position at startup:
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    // call a function whenever the cursor moves:
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    // calculate the new cursor position:
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    // set the element's new position:
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }

  function closeDragElement() {
    // stop moving when mouse button is released:
    document.onmouseup = null;
    document.onmousemove = null;
  }

  }
  (function () {
    const aboutBtn = document.getElementById('about_btn');
    const mydiv = document.getElementById('mydiv');
    

    aboutBtn?.addEventListener('click', function (e) {
      // prevent any default handler if needed
      // e.preventDefault();
      if (mydiv) mydiv.style.display = 'block';
    });

    // optionally restore mydiv when modal closes (uncomment if you add a close action)
    /*
    const aboutClose = document.getElementById('about_close');
    aboutClose?.addEventListener('click', function () {
      if (mydiv) mydiv.style.display = '';
    });
    */
  })();


  
</script>
